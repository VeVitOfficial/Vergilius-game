<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Vergilius — Ztracené knihy Říma</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #1a0f0a;
        }
        #game-container {
            width: 100%;
            height: 100%;
            display: block;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>
</head>
<body>
    <div id="game-container"></div>

<script>
// ═══════════════════════════════════════════════════════════════
//  KONFIGURACE A KONSTANTY
// ═══════════════════════════════════════════════════════════════

const WORLD_W = 3000;
const WORLD_H = 2400;
const PLAYER_SPEED = 200;
const PLAYER_SIZE = { w: 28, h: 36 };
const BOOK_SIZE = { w: 24, h: 32 };
const INTERACTION_DISTANCE = 70;
const HOME_DELIVER_DISTANCE = 100;

const COLORS = {
    bgDark: 0x2C1810,
    bgLight: 0x4A3520,
    road: 0x8B7355,
    roadMain: 0x9B8570,
    forumFloor: 0xA89070,
    forumAccent: 0x8F7860,
    building: 0x6B5D4F,
    buildingEdge: 0x3A2F25,
    roof: 0x4A3D35,
    column: 0xE8DCC0,
    columnBase: 0x9B8B7F,
    player: 0xFFD700,
    playerEdge: 0xB8860B,
    book: 0x87CEEB,
    bookCross: 0xFFD700,
    water: 0x1E4D6B,
    waterDeep: 0x153A4F,
    pier: 0x5C4033,
    field: 0x3D5A3D,
    furrow: 0x2E452E,
    cemetery: 0x2A2A2A,
    tombstone: 0x4A4A4A,
    park: 0x4A6B3D,
    tree: 0x2E4A22,
    treeCanopy: 0x3D6B30,
    ruinFloor: 0x7A7A6E,
    ruinStone: 0x9A9A8E,
    bush: 0x4A7C3F,
    homeBorder: 0xFFD700,
    homeBg: 0x6B5D4F,
    gold: 0xFFD700,
    white: 0xFFFFFF,
    black: 0x000000,
    hudBg: 0x1A0F0A
};

const HOME = { x: 500, y: 500, w: 180, h: 180 }; // SV od fóra

// ═══════════════════════════════════════════════════════════════
//  MENU SCENE
// ═══════════════════════════════════════════════════════════════

class MenuScene extends Phaser.Scene {
    constructor() { super({ key: 'MenuScene' }); }

    create() {
        const w = this.cameras.main.width;
        const h = this.cameras.main.height;

        // Pozadí s gradientem
        const gfx = this.add.graphics();
        for (let y = 0; y < h; y++) {
            const t = y / h;
            const r = Math.floor(26 + (74 - 26) * t);
            const g = Math.floor(15 + (53 - 15) * t);
            const b = Math.floor(10 + (32 - 10) * t);
            gfx.fillStyle(Phaser.Display.Color.GetColor(r, g, b), 1);
            gfx.fillRect(0, y, w, 1);
        }

        // Zlatý rámeček
        const frame = this.add.graphics();
        frame.lineStyle(4, COLORS.gold, 0.6);
        frame.strokeRect(w * 0.1, h * 0.15, w * 0.8, h * 0.65);

        // Hlavní nadpis
        this.add.text(w / 2, h * 0.35, 'VERGILIUS', {
            fontFamily: 'Cinzel, Georgia, serif',
            fontSize: Math.max(48, Math.min(w * 0.1, 96)) + 'px',
            color: '#FFD700',
            stroke: '#8B4513',
            strokeThickness: 6
        }).setOrigin(0.5);

        // Podtitul
        this.add.text(w / 2, h * 0.48, 'Ztracené knihy Říma', {
            fontFamily: 'Cinzel, Georgia, serif',
            fontSize: Math.max(18, w * 0.025) + 'px',
            color: '#D4C4A8',
            letterSpacing: 2
        }).setOrigin(0.5);

        // Instrukce
        this.add.text(w / 2, h * 0.68, '[ ENTER ] Začít hru', {
            fontFamily: 'Georgia, serif',
            fontSize: Math.max(16, w * 0.02) + 'px',
            color: '#FFFFFF'
        }).setOrigin(0.5);

        // Stisk ENTER → OverworldScene
        this.input.keyboard.on('keydown-ENTER', () => {
            this.cameras.main.fadeOut(400, 0, 0, 0);
            this.cameras.main.once('camerafadeoutcomplete', () => {
                this.scene.start('OverworldScene');
            });
        });

        // Inicializace registru (globální stav mezi scénami)
        this.registry.set('booksCollected', 0);
        this.registry.set('inventory', []);
    }
}

// ═══════════════════════════════════════════════════════════════
//  OVERWORLD SCENE
// ═══════════════════════════════════════════════════════════════

class OverworldScene extends Phaser.Scene {
    constructor() { super({ key: 'OverworldScene' }); }

    create() {
        this.booksTotal = 5;
        this.booksCollected = this.registry.get('booksCollected') || 0;
        this.inventory = this.registry.get('inventory') || [];
        this.gameWon = false;

        this.createMap();
        this.createPlayer();
        this.createBooks();
        this.createDecorations();
        this.createUI();
        this.setupInput();

        // Kolize
        this.physics.add.collider(this.player, this.buildings);
        this.physics.add.collider(this.player, this.obstacles);

        // Fade in při návratu z minihry
        this.cameras.main.fadeIn(300, 0, 0, 0);
    }

    update() {
        if (this.gameWon) return;
        this.handlePlayerMovement();
        this.updateBookHints();
        this.updateHomeHint();
        this.updateMinimap();
        this.updatePlayerLabel();
    }

    // ─── MAPA ─────────────────────────────────────────────────
    createMap() {
        const gfx = this.add.graphics();

        // 1) GRADIENT POZADÍ (tmavá okrová → světlejší uprostřed)
        const cx = WORLD_W / 2;
        const cy = WORLD_H / 2;
        for (let r = 0; r < Math.max(WORLD_W, WORLD_H); r += 4) {
            const t = Math.min(r / 1400, 1);
            const rr = Math.floor(44 + (30 - 44) * t);   // 4A3520 → 2C1810
            const gg = Math.floor(53 + (24 - 53) * t);
            const bb = Math.floor(32 + (16 - 32) * t);
            gfx.fillStyle(Phaser.Display.Color.GetColor(rr, gg, bb), 1);
            gfx.fillCircle(cx, cy, Math.max(WORLD_W, WORLD_H) - r);
        }

        // 2) BIOMY

        // Přístav (JZ roh)
        gfx.fillStyle(COLORS.water, 1);
        gfx.fillRect(2200, 1800, 800, 600);
        gfx.fillStyle(COLORS.waterDeep, 1);
        gfx.fillRect(2300, 1900, 600, 400);

        // Molo
        gfx.fillStyle(COLORS.pier, 1);
        gfx.fillRect(2350, 2100, 300, 40);
        gfx.fillStyle(0x4A3520, 1);
        for (let x = 2360; x < 2640; x += 40) {
            gfx.fillRect(x, 2100, 2, 40);
        }

        // Pole (SZ)
        gfx.fillStyle(COLORS.field, 1);
        gfx.fillRect(50, 50, 600, 500);
        gfx.fillStyle(COLORS.furrow, 0.4);
        for (let y = 70; y < 520; y += 30) {
            gfx.fillRect(50, y, 600, 6);
        }

        // Hřbitov (S)
        gfx.fillStyle(COLORS.cemetery, 1);
        gfx.fillRect(1200, 1900, 700, 400);
        // Náhrobky
        gfx.fillStyle(COLORS.tombstone, 1);
        const tombs = [
            [1250, 1950, 20, 30], [1300, 1980, 18, 28], [1400, 1960, 22, 32],
            [1500, 2000, 20, 30], [1600, 1940, 24, 34], [1700, 1990, 20, 30],
            [1350, 2100, 20, 30], [1550, 2150, 18, 28], [1650, 2120, 22, 32]
        ];
        tombs.forEach(t => gfx.fillRect(t[0], t[1], t[2], t[3]));

        // Park (V)
        gfx.fillStyle(COLORS.park, 1);
        gfx.fillRect(2500, 800, 450, 700);

        // Ruiny (SV)
        gfx.fillStyle(COLORS.ruinFloor, 1);
        gfx.fillRect(50, 50, 500, 500);
        gfx.fillStyle(COLORS.ruinStone, 1);
        const stones = [
            [80, 80, 60, 40], [200, 150, 40, 60], [300, 100, 80, 30],
            [120, 250, 50, 50], [400, 300, 70, 40], [350, 200, 40, 40],
            [100, 400, 90, 30], [250, 350, 60, 60]
        ];
        stones.forEach(s => gfx.fillRect(s[0], s[1], s[2], s[3]));

        // 3) CESTY (síť ulic)
        gfx.fillStyle(COLORS.road, 1);
        // Horizontální
        const hRoads = [
            { y: 400, w: WORLD_W, thick: 60 },
            { y: 900, w: WORLD_W, thick: 80 },   // hlavní východozápadní
            { y: 1500, w: WORLD_W, thick: 60 },
            { y: 2000, w: 2200, thick: 60 }      // k přístavu
        ];
        hRoads.forEach(r => gfx.fillRect(0, r.y - r.thick / 2, r.w, r.thick));

        // Vertikální
        const vRoads = [
            { x: 400, h: WORLD_H, thick: 60 },
            { x: 1000, h: WORLD_H, thick: 80 },   // hlavní severojížní
            { x: 1600, h: WORLD_H, thick: 60 },
            { x: 2400, h: 1400, thick: 60 }       // k parku
        ];
        vRoads.forEach(r => gfx.fillRect(r.x - r.thick / 2, 0, r.thick, r.h));

        // Spojovací cesty k přístavu
        gfx.fillRect(1000 - 30, 1500, 60, 500); // dolů k přístavu
        gfx.fillRect(1000, 2000 - 30, 1200, 60); // vpravo k přístavu

        // Hlavní ulice odlišná barva
        gfx.fillStyle(COLORS.roadMain, 1);
        gfx.fillRect(0, 900 - 40, WORLD_W, 80);
        gfx.fillRect(1000 - 40, 0, 80, WORLD_H);

        // 4) FORUM ROMANUM
        const fx = 1200, fy = 700, fw = 400, fh = 400;
        gfx.fillStyle(COLORS.forumFloor, 1);
        gfx.fillRect(fx, fy, fw, fh);
        // Dlaždice (mřížka)
        gfx.lineStyle(1, COLORS.forumAccent, 0.3);
        for (let i = 0; i <= fw; i += 40) {
            gfx.moveTo(fx + i, fy);
            gfx.lineTo(fx + i, fy + fh);
        }
        for (let i = 0; i <= fh; i += 40) {
            gfx.moveTo(fx, fy + i);
            gfx.lineTo(fx + fw, fy + i);
        }
        gfx.strokePath();

        // Sloupy kolem fóra
        const colPositions = [
            [fx + 20, fy + 20], [fx + fw - 36, fy + 20],
            [fx + 20, fy + fh - 36], [fx + fw - 36, fy + fh - 36],
            [fx + fw / 2 - 8, fy + 20], [fx + fw / 2 - 8, fy + fh - 36],
            [fx + 20, fy + fh / 2 - 8], [fx + fw - 36, fy + fh / 2 - 8]
        ];
        colPositions.forEach(([x, y]) => {
            gfx.fillStyle(COLORS.columnBase, 1);
            gfx.fillRect(x, y, 16, 16);
            gfx.fillStyle(COLORS.column, 1);
            gfx.fillCircle(x + 8, y + 8, 6);
        });

        // 5) BUDOVY (s fyzickou kolizí)
        this.buildings = this.physics.add.staticGroup();
        this.obstacles = this.physics.add.staticGroup();

        const buildings = [
            // { x, y, w, h } — 15-20 budov podél cest
            { x: 250, y: 300, w: 100, h: 90 },
            { x: 600, y: 150, w: 120, h: 100 },
            { x: 1300, y: 200, w: 150, h: 110 },
            { x: 1800, y: 300, w: 110, h: 130 },
            { x: 2500, y: 350, w: 140, h: 90 },
            { x: 100, y: 700, w: 130, h: 100 },
            { x: 550, y: 750, w: 100, h: 120 },
            { x: 1700, y: 650, w: 160, h: 100 },
            { x: 2200, y: 800, w: 120, h: 140 },
            { x: 150, y: 1100, w: 120, h: 90 },
            { x: 600, y: 1200, w: 100, h: 140 },
            { x: 1800, y: 1100, w: 130, h: 110 },
            { x: 2300, y: 1300, w: 110, h: 100 },
            { x: 200, y: 1650, w: 140, h: 110 },
            { x: 700, y: 1700, w: 100, h: 130 },
            { x: 1700, y: 1750, w: 150, h: 90 },
            { x: 2200, y: 1650, w: 120, h: 120 },
            { x: 1300, y: 1300, w: 110, h: 100 },
            { x: 2600, y: 1700, w: 100, h: 100 }
        ];

        buildings.forEach(b => {
            // Tělo budovy
            gfx.fillStyle(COLORS.building, 1);
            gfx.fillRect(b.x, b.y, b.w, b.h);
            // Tmavší okraj
            gfx.lineStyle(2, COLORS.buildingEdge, 1);
            gfx.strokeRect(b.x, b.y, b.w, b.h);
            // Střecha (trojúhelník)
            gfx.fillStyle(COLORS.roof, 1);
            gfx.beginPath();
            gfx.moveTo(b.x - 8, b.y);
            gfx.lineTo(b.x + b.w / 2, b.y - 20);
            gfx.lineTo(b.x + b.w + 8, b.y);
            gfx.closePath();
            gfx.fillPath();
            gfx.lineStyle(2, COLORS.buildingEdge, 1);
            gfx.strokePath();

            // Fyzické tělo (collision)
            const body = this.add.rectangle(b.x + b.w / 2, b.y + b.h / 2, b.w, b.h, 0x000000, 0);
            this.physics.add.existing(body, true);
            this.buildings.add(body);
        });

        // 6) VERGILIŮV DŮM
        const hx = HOME.x, hy = HOME.y, hw = HOME.w, hh = HOME.h;
        gfx.fillStyle(COLORS.homeBg, 1);
        gfx.fillRect(hx, hy, hw, hh);
        gfx.lineStyle(4, COLORS.homeBorder, 1);
        gfx.strokeRect(hx, hy, hw, hh);
        // Střecha
        gfx.fillStyle(COLORS.roof, 1);
        gfx.beginPath();
        gfx.moveTo(hx - 10, hy);
        gfx.lineTo(hx + hw / 2, hy - 30);
        gfx.lineTo(hx + hw + 10, hy);
        gfx.closePath();
        gfx.fillPath();
        gfx.strokePath();

        const homeBody = this.add.rectangle(hx + hw / 2, hy + hh / 2, hw, hh, 0x000000, 0);
        this.physics.add.existing(homeBody, true);
        this.buildings.add(homeBody);

        // Nápis nad domem
        this.add.text(hx + hw / 2, hy - 45, 'DOMUS VERGILII', {
            fontFamily: 'Cinzel, Georgia, serif',
            fontSize: '22px',
            color: '#FFD700',
            stroke: '#000000',
            strokeThickness: 4
        }).setOrigin(0.5);

        // Omezení kamery a fyziky na svět
        this.cameras.main.setBounds(0, 0, WORLD_W, WORLD_H);
        this.physics.world.setBounds(0, 0, WORLD_W, WORLD_H);
    }

    // ─── DEKORACE (stromy, keře, studny...) ────────────────────
    createDecorations() {
        const gfx = this.add.graphics();

        // Stromy v parku (V)
        const trees = [
            [2550, 900], [2600, 950], [2700, 900], [2800, 1000], [2900, 950],
            [2550, 1100], [2650, 1150], [2750, 1100], [2850, 1200],
            [2600, 1300], [2700, 1350], [2800, 1300], [2900, 1400]
        ];
        trees.forEach(([x, y]) => {
            gfx.fillStyle(COLORS.tree, 1);
            gfx.fillCircle(x, y, 22);
            gfx.fillStyle(COLORS.treeCanopy, 1);
            gfx.fillCircle(x - 5, y - 5, 14);
            // Fyzický strom (menší collision)
            const t = this.add.circle(x, y, 16, 0x000000, 0);
            this.physics.add.existing(t, true);
            this.obstacles.add(t);
        });

        // Keře podél cest
        const bushes = [
            [300, 850], [450, 950], [750, 880], [850, 920],
            [1100, 500], [1150, 550], [1250, 480],
            [1400, 1550], [1450, 1600], [1550, 1580],
            [1850, 2000], [1950, 2050], [2050, 1980]
        ];
        bushes.forEach(([x, y]) => {
            gfx.fillStyle(COLORS.bush, 1);
            gfx.fillCircle(x, y, 12);
            gfx.fillCircle(x + 10, y + 4, 10);
            gfx.fillCircle(x - 8, y + 5, 9);
        });

        // Sochy podél cest
        const statues = [
            [1000, 400], [1000, 1400], [400, 900], [1600, 900]
        ];
        statues.forEach(([x, y]) => {
            gfx.fillStyle(COLORS.column, 1);
            gfx.fillRect(x - 6, y, 12, 30);
            gfx.fillStyle(COLORS.column, 0.8);
            gfx.fillCircle(x, y - 6, 8);
        });

        // Studny
        const wells = [
            [700, 500], [2000, 1000]
        ];
        wells.forEach(([x, y]) => {
            gfx.fillStyle(COLORS.buildingEdge, 1);
            gfx.fillCircle(x, y, 20);
            gfx.fillStyle(0x1A0F0A, 1);
            gfx.fillCircle(x, y, 12);
            gfx.lineStyle(2, COLORS.columnBase, 1);
            gfx.strokeCircle(x, y, 20);
        });
    }

    // ─── HRÁČ ─────────────────────────────────────────────────
    createPlayer() {
        // Generujeme texturu pro hráče (zlatý obdélník s okrajem)
        const g = this.make.graphics({ x: 0, y: 0 });
        g.fillStyle(COLORS.playerEdge, 1);
        g.fillRect(0, 0, PLAYER_SIZE.w, PLAYER_SIZE.h);
        g.fillStyle(COLORS.player, 1);
        g.fillRect(2, 2, PLAYER_SIZE.w - 4, PLAYER_SIZE.h - 4);
        g.generateTexture('playerTex', PLAYER_SIZE.w, PLAYER_SIZE.h);

        // Spawn před domem
        this.player = this.physics.add.sprite(HOME.x + HOME.w / 2, HOME.y + HOME.h + 40, 'playerTex');
        this.player.setCollideWorldBounds(true);

        // Nápis nad hlavou
        this.playerLabel = this.add.text(this.player.x, this.player.y - 30, 'Vergilius', {
            fontFamily: 'Georgia, serif',
            fontSize: '12px',
            color: '#FFFFFF',
            stroke: '#000000',
            strokeThickness: 2
        }).setOrigin(0.5);

        // Kamera sleduje hráče (plynule)
        this.cameras.main.startFollow(this.player, true, 0.08, 0.08);
    }

    // ─── KNIHY ────────────────────────────────────────────────
    createBooks() {
        this.bookData = [
            { key: 'AENEIS_I', name: 'AENEIS I', x: 2500, y: 2120, desc: 'u přístavu' },
            { key: 'AENEIS_II', name: 'AENEIS II', x: 150, y: 150, desc: 'u ruin' },
            { key: 'AENEIS_VI', name: 'AENEIS VI', x: 1550, y: 2050, desc: 'na hřbitově' },
            { key: 'GEORGICA', name: 'GEORGICA', x: 350, y: 300, desc: 'u pole' },
            { key: 'BUCOLICA', name: 'BUCOLICA', x: 2725, y: 1150, desc: 'v parku' }
        ];

        // Generování textury knihy (modrá se zlatým křížkem)
        const g = this.make.graphics({ x: 0, y: 0 });
        g.fillStyle(COLORS.book, 1);
        g.fillRect(0, 0, BOOK_SIZE.w, BOOK_SIZE.h);
        g.fillStyle(COLORS.bookCross, 1);
        g.fillRect(10, 4, 4, 24);
        g.fillRect(4, 14, 16, 4);
        g.generateTexture('bookTex', BOOK_SIZE.w, BOOK_SIZE.h);

        this.books = [];
        this.bookHints = [];

        this.bookData.forEach((data, index) => {
            const book = this.add.sprite(data.x, data.y, 'bookTex');
            book.setData('key', data.key);
            book.setData('name', data.name);
            book.setData('index', index);

            // Pulzující animace (tween)
            this.tweens.add({
                targets: book,
                scaleX: 1.1,
                scaleY: 1.1,
                duration: 1000,
                yoyo: true,
                repeat: -1,
                ease: 'Sine.easeInOut'
            });

            // Název knihy (viditelný vždy, zlatý)
            const label = this.add.text(data.x, data.y - 30, data.name, {
                fontFamily: 'Georgia, serif',
                fontSize: '11px',
                color: '#FFD700',
                stroke: '#000000',
                strokeThickness: 2
            }).setOrigin(0.5).setAlpha(0.8);

            // Hint k sebrání
            const hint = this.add.text(data.x, data.y - 55, '[ E ] Sebrat', {
                fontFamily: 'Georgia, serif',
                fontSize: '14px',
                color: '#FFD700',
                stroke: '#000000',
                strokeThickness: 3
            }).setOrigin(0.5).setVisible(false);

            this.books.push({ sprite: book, label: label, hint: hint, data: data });
        });
    }

    // ─── UI / HUD ─────────────────────────────────────────────
    createUI() {
        const vw = this.cameras.main.width;
        const vh = this.cameras.main.height;

        // Počítadlo knih (levý horní roh, fixed)
        this.bookCounter = this.add.text(20, 20, 'Knihy: ' + this.booksCollected + '/5', {
            fontFamily: 'Cinzel, Georgia, serif',
            fontSize: '20px',
            color: '#FFD700',
            stroke: '#000000',
            strokeThickness: 4
        }).setScrollFactor(0).setDepth(100);

        // Hint pro odevzdání (uprostřed dole, fixed)
        this.homeHint = this.add.text(vw / 2, vh - 50, '[ E ] Odevzdat knihy', {
            fontFamily: 'Georgia, serif',
            fontSize: '18px',
            color: '#FFD700',
            stroke: '#000000',
            strokeThickness: 4
        }).setOrigin(0.5).setScrollFactor(0).setVisible(false).setDepth(100);

        // Minimapa (pravý horní roh, fixed)
        this.minimapW = 200;
        this.minimapH = 150;
        this.minimapX = vw - this.minimapW - 20;
        this.minimapY = 20;

        this.minimapGraphics = this.add.graphics();
        this.minimapGraphics.setScrollFactor(0);
        this.minimapGraphics.setDepth(90);

        // Okraj minimapy
        this.minimapBorder = this.add.graphics();
        this.minimapBorder.setScrollFactor(0);
        this.minimapBorder.setDepth(91);
        this.minimapBorder.lineStyle(2, COLORS.gold, 0.5);
        this.minimapBorder.fillStyle(COLORS.hudBg, 0.6);
        this.minimapBorder.fillRect(this.minimapX, this.minimapY, this.minimapW, this.minimapH);
        this.minimapBorder.strokeRect(this.minimapX, this.minimapY, this.minimapW, this.minimapH);
    }

    // ─── VSTUP Z KLÁVESNICE ───────────────────────────────────
    setupInput() {
        this.cursors = this.input.keyboard.createCursorKeys();
        this.wasd = this.input.keyboard.addKeys({
            up: Phaser.Input.Keyboard.KeyCodes.W,
            down: Phaser.Input.Keyboard.KeyCodes.S,
            left: Phaser.Input.Keyboard.KeyCodes.A,
            right: Phaser.Input.Keyboard.KeyCodes.D
        });
        this.input.keyboard.on('keydown-E', () => this.handleInteraction());
    }

    // ─── POHYB HRÁČE ─────────────────────────────────────────
    handlePlayerMovement() {
        let vx = 0, vy = 0;

        if (this.cursors.left.isDown || this.wasd.left.isDown) vx -= PLAYER_SPEED;
        if (this.cursors.right.isDown || this.wasd.right.isDown) vx += PLAYER_SPEED;
        if (this.cursors.up.isDown || this.wasd.up.isDown) vy -= PLAYER_SPEED;
        if (this.cursors.down.isDown || this.wasd.down.isDown) vy += PLAYER_SPEED;

        // Normalizace diagonály
        if (vx !== 0 && vy !== 0) {
            const f = 1 / Math.sqrt(2);
            vx *= f;
            vy *= f;
        }

        this.player.setVelocity(vx, vy);
    }

    // ─── AKTUALIZACE NÁPISU NAD HRÁČEM ───────────────────────
    updatePlayerLabel() {
        this.playerLabel.setPosition(this.player.x, this.player.y - 28);
    }

    // ─── AKTUALIZACE HINTŮ U KNIH ────────────────────────────
    updateBookHints() {
        this.books.forEach(item => {
            const book = item.sprite;
            const collected = this.registry.get('book_' + item.data.key) === true;

            if (collected) {
                book.setVisible(false);
                item.label.setVisible(false);
                item.hint.setVisible(false);
                return;
            }

            const dist = Phaser.Math.Distance.Between(this.player.x, this.player.y, book.x, book.y);
            item.hint.setVisible(dist <= INTERACTION_DISTANCE);
        });
    }

    // ─── AKTUALIZACE HINTU U DOMU ────────────────────────────
    updateHomeHint() {
        const homeCX = HOME.x + HOME.w / 2;
        const homeCY = HOME.y + HOME.h / 2;
        const dist = Phaser.Math.Distance.Between(this.player.x, this.player.y, homeCX, homeCY);
        const hasBooks = this.inventory.length > 0;
        this.homeHint.setVisible(dist <= HOME_DELIVER_DISTANCE && hasBooks);
    }

    // ─── MINIMAPA ────────────────────────────────────────────
    updateMinimap() {
        const g = this.minimapGraphics;
        g.clear();

        const mx = this.minimapX;
        const my = this.minimapY;
        const mw = this.minimapW;
        const mh = this.minimapH;
        const scaleX = mw / WORLD_W;
        const scaleY = mh / WORLD_H;

        // Cesty
        g.fillStyle(COLORS.road, 1);
        const hRoads = [400, 900, 1500, 2000];
        hRoads.forEach(y => g.fillRect(mx, my + y * scaleY, mw, 3));
        const vRoads = [400, 1000, 1600, 2400];
        vRoads.forEach(x => g.fillRect(mx + x * scaleX, my, 3, mh));

        // Forum
        g.fillStyle(COLORS.forumFloor, 1);
        g.fillRect(mx + 1200 * scaleX, my + 700 * scaleY, 400 * scaleX, 400 * scaleY);

        // Vergiliův dům
        g.fillStyle(COLORS.homeBorder, 1);
        g.fillRect(mx + HOME.x * scaleX, my + HOME.y * scaleY, HOME.w * scaleX, HOME.h * scaleY);

        // Knihy
        this.books.forEach(item => {
            const collected = this.registry.get('book_' + item.data.key) === true;
            if (!collected) {
                g.fillStyle(COLORS.book, 1);
                g.fillCircle(mx + item.data.x * scaleX, my + item.data.y * scaleY, 3);
            }
        });

        // Hráč (červená tečka)
        g.fillStyle(0xFF3333, 1);
        g.fillCircle(mx + this.player.x * scaleX, my + this.player.y * scaleY, 4);
    }

    // ─── INTERAKCE (stisk E) ───────────────────────────────────
    handleInteraction() {
        if (this.gameWon) return;

        // Sebrání knihy
        this.books.forEach(item => {
            const collected = this.registry.get('book_' + item.data.key) === true;
            if (collected) return;

            const dist = Phaser.Math.Distance.Between(this.player.x, this.player.y, item.sprite.x, item.sprite.y);
            if (dist <= INTERACTION_DISTANCE) {
                this.collectBook(item);
            }
        });

        // Odevzdání u domu
        const homeCX = HOME.x + HOME.w / 2;
        const homeCY = HOME.y + HOME.h / 2;
        const homeDist = Phaser.Math.Distance.Between(this.player.x, this.player.y, homeCX, homeCY);
        if (homeDist <= HOME_DELIVER_DISTANCE && this.inventory.length > 0) {
            this.deliverBooks();
        }
    }

    // ─── SEBRÁNÍ KNIHY ────────────────────────────────────────
    collectBook(item) {
        const key = item.data.key;

        // Označení jako sebrané v registru
        this.registry.set('book_' + key, true);

        // Aktualizace inventáře
        this.inventory.push(key);
        this.booksCollected++;
        this.registry.set('booksCollected', this.booksCollected);
        this.registry.set('inventory', [...this.inventory]);

        // Aktualizace UI
        this.bookCounter.setText('Knihy: ' + this.booksCollected + '/5');

        // Fade-out knihy
        this.tweens.add({
            targets: [item.sprite, item.label, item.hint],
            alpha: 0,
            duration: 200,
            onComplete: () => {
                // Přechod na minihru
                this.cameras.main.fadeOut(300, 0, 0, 0);
                this.cameras.main.once('camerafadeoutcomplete', () => {
                    this.scene.start('MinigameScene', { book: key, bookName: item.data.name });
                });
            }
        });
    }

    // ─── ODEVZDÁNÍ KNIH ───────────────────────────────────────
    deliverBooks() {
        // Vyprázdnění inventáře (knihy jsou už v registru jako sebrané)
        this.inventory = [];
        this.registry.set('inventory', []);

        if (this.booksCollected >= this.booksTotal) {
            this.triggerWin();
        }
    }

    // ─── VÝHRA ───────────────────────────────────────────────
    triggerWin() {
        this.gameWon = true;
        this.cameras.main.fadeOut(600, 0, 0, 0);
        this.cameras.main.once('camerafadeoutcomplete', () => {
            this.scene.start('WinScene');
        });
    }
}

//  MINIGAME SCENE (placeholder)

class MinigameScene extends Phaser.Scene {
    constructor() { super({ key: 'MinigameScene' }); }

    init(data) {
        this.bookKey = data.book || 'UNKNOWN';
        this.bookName = data.bookName || 'Neznámá kniha';
    }

    create() {
        const w = this.cameras.main.width;
        const h = this.cameras.main.height;

        // Černé pozadí
        this.add.rectangle(w / 2, h / 2, w, h, COLORS.black);

        // Název knihy
        this.add.text(w / 2, h * 0.35, this.bookName, {
            fontFamily: 'Cinzel, Georgia, serif',
            fontSize: Math.max(36, Math.min(w * 0.06, 64)) + 'px',
            color: '#FFD700',
            stroke: '#8B4513',
            strokeThickness: 4
        }).setOrigin(0.5);

        // Podtitul
        this.add.text(w / 2, h * 0.52, 'Minihra připravována...', {
            fontFamily: 'Georgia, serif',
            fontSize: Math.max(16, w * 0.025) + 'px',
            color: '#AAAAAA'
        }).setOrigin(0.5);

        // Instrukce zpět
        this.add.text(w / 2, h * 0.75, '[ ESC ] Zpět do Říma', {
            fontFamily: 'Georgia, serif',
            fontSize: Math.max(16, w * 0.02) + 'px',
            color: '#FFFFFF'
        }).setOrigin(0.5);

        // Stisk ESC → návrat
        this.input.keyboard.on('keydown-ESC', () => {
            this.cameras.main.fadeOut(300, 0, 0, 0);
            this.cameras.main.once('camerafadeoutcomplete', () => {
                this.scene.start('OverworldScene');
            });
        });

        this.cameras.main.fadeIn(300, 0, 0, 0);
    }
}

// ═══════════════════════════════════════════════════════════════
//  WIN SCENE
// ═══════════════════════════════════════════════════════════════

class WinScene extends Phaser.Scene {
    constructor() { super({ key: 'WinScene' }); }

    create() {
        const w = this.cameras.main.width;
        const h = this.cameras.main.height;

        // Černé pozadí
        this.add.rectangle(w / 2, h / 2, w, h, COLORS.black);

        // Hlavní vítězný text
        this.add.text(w / 2, h * 0.4, 'GLORIA VERGILIO', {
            fontFamily: 'Cinzel, Georgia, serif',
            fontSize: Math.max(36, Math.min(w * 0.07, 72)) + 'px',
            color: '#FFD700',
            stroke: '#8B4513',
            strokeThickness: 5
        }).setOrigin(0.5);

        // Podtitul
        this.add.text(w / 2, h * 0.55, 'Všechny knihy byly navráceny do domu!', {
            fontFamily: 'Georgia, serif',
            fontSize: Math.max(16, w * 0.025) + 'px',
            color: '#D4C4A8'
        }).setOrigin(0.5);

        // Restart instrukce
        this.add.text(w / 2, h * 0.75, '[ R ] Restart hry', {
            fontFamily: 'Georgia, serif',
            fontSize: Math.max(16, w * 0.02) + 'px',
            color: '#FFFFFF'
        }).setOrigin(0.5);

        // Stisk R → restart
        this.input.keyboard.on('keydown-R', () => {
            // Reset registru
            this.registry.set('booksCollected', 0);
            this.registry.set('inventory', []);
            ['AENEIS_I', 'AENEIS_II', 'AENEIS_VI', 'GEORGICA', 'BUCOLICA'].forEach(k => {
                this.registry.set('book_' + k, false);
            });

            this.cameras.main.fadeOut(400, 0, 0, 0);
            this.cameras.main.once('camerafadeoutcomplete', () => {
                this.scene.start('MenuScene');
            });
        });

        this.cameras.main.fadeIn(500, 0, 0, 0);
    }
}
